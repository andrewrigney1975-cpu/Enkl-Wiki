server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxied on the same origin as the static site, so the browser
    # never sees a cross-origin request to the API — no CORS configuration
    # needed, and the client's "API Base URL" setting can be left blank.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static uploads/pages content served alongside dist/index.html (used by
    # the filesystem-backed content mode, unrelated to rdbms mode's own
    # /api/uploads streaming endpoint).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
