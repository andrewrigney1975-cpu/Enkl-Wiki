<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enkl-Wiki</title>
<script>
  /* Applied before CSS paints so there's no flash of the wrong theme. */
  (function () {
    try {
      if (localStorage.getItem('enklwiki_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) { /* localStorage unavailable (e.g. some file:// contexts) */ }
  })();
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='%230c2a52'/%3E%3Cpath d='M6 18.5V22h3.5L18 13.5l-3.5-3.5L6 18.5zM20 8.7a1.3 1.3 0 0 0 0-1.9l-2.3-2.3a1.3 1.3 0 0 0-1.9 0l-1.6 1.6 4.2 4.2 1.6-1.6z' fill='white'/%3E%3C/svg%3E">
<!-- Google Font "Inter" per spec; base.css supplies a full system-font fallback
     stack so the app still reads correctly with no network connection. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<!--STYLES-->
</head>
<body>
<div id="app"></div>
<!--SCRIPT-->
</body>
</html>
